name: Tests

on:
  push:
  pull_request:

jobs:
  phpunit:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: ['8.2', '8.3']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP ${{ matrix.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: pdo, pdo_mysql, pdo_pgsql, gd, openssl
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -P 3306 -u root --silent; do
            sleep 1
          done

      - name: Create test schema
        run: |
          mysql -h 127.0.0.1 -u root testdb -e "
          CREATE TABLE IF NOT EXISTS test_table (
              id INT AUTO_INCREMENT PRIMARY KEY,
              name VARCHAR(255),
              email VARCHAR(255),
              price DECIMAL(10,2),
              rating DECIMAL(3,2),
              status VARCHAR(50),
              type VARCHAR(50),
              tags JSON,
              created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );"

      - name: Run test suite
        run: php vendor/bin/phpunit --no-coverage
